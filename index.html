<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperture — Ask Anything</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0b0d17;
    --glow-violet:#5b5fef;
    --glow-coral:#e0664b;
    --text-primary:#f2f1f7;
    --text-muted:#8a8aa3;
    --panel:rgba(20,21,36,0.55);
    --panel-border:rgba(255,255,255,0.08);
    --sidebar-w:260px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}

  body{
    background:var(--bg-deep);
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
    display:flex;
  }

  /* ambient drifting orbs */
  .orb{
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.35;
    pointer-events:none;
    z-index:0;
  }
  .orb-1{ width:520px;height:520px; background:var(--glow-violet); top:-180px;left:-160px; animation:drift1 22s ease-in-out infinite; }
  .orb-2{ width:460px;height:460px; background:var(--glow-coral); bottom:-200px;right:-150px; animation:drift2 26s ease-in-out infinite; }
  @keyframes drift1{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(60px,40px) scale(1.1);} }
  @keyframes drift2{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-50px,-30px) scale(1.08);} }

  /* ---------------- Sidebar ---------------- */
  .sidebar{
    position:fixed;
    top:0; left:0; bottom:0;
    width:var(--sidebar-w);
    background:rgba(12,13,22,0.85);
    backdrop-filter:blur(20px);
    border-right:1px solid var(--panel-border);
    z-index:10;
    display:flex;
    flex-direction:column;
    padding:16px 12px;
    transition:transform 0.25s ease;
  }
  .sidebar.collapsed{ transform:translateX(calc(-1 * var(--sidebar-w))); }

  .new-chat-btn{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--panel-border);
    background:transparent;
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:background 0.15s ease, border-color 0.15s ease;
    margin-bottom:14px;
  }
  .new-chat-btn:hover{ background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.18); }
  .new-chat-btn svg{ width:16px;height:16px; flex-shrink:0; }

  .chat-list{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .chat-list::-webkit-scrollbar{ width:6px; }
  .chat-list::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.1); border-radius:3px; }

  .chat-item{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    padding:10px 12px;
    border-radius:10px;
    cursor:pointer;
    font-size:13.5px;
    color:var(--text-muted);
    border-left:2px solid transparent;
    transition:background 0.15s ease, color 0.15s ease;
  }
  .chat-item:hover{ background:rgba(255,255,255,0.05); color:var(--text-primary); }
  .chat-item.active{
    background:rgba(255,255,255,0.07);
    color:var(--text-primary);
    border-left:2px solid var(--glow-violet);
  }
  .chat-item .title{
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
  }
  .chat-item .delete-btn{
    flex-shrink:0;
    opacity:0;
    width:20px;height:20px;
    display:flex; align-items:center; justify-content:center;
    border-radius:6px;
    color:var(--text-muted);
    background:transparent;
    border:none;
    cursor:pointer;
    transition:opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  .chat-item:hover .delete-btn{ opacity:1; }
  .chat-item .delete-btn:hover{ background:rgba(224,102,75,0.25); color:#f2c9bd; }
  .chat-item .delete-btn svg{ width:13px;height:13px; }

  .sidebar-empty{
    color:var(--text-muted);
    font-size:12.5px;
    text-align:center;
    padding:24px 12px;
    opacity:0.7;
  }

  /* mobile sidebar toggle */
  .sidebar-toggle{
    position:fixed;
    top:16px; left:16px;
    z-index:20;
    width:38px;height:38px;
    border-radius:10px;
    border:1px solid var(--panel-border);
    background:rgba(20,21,36,0.7);
    backdrop-filter:blur(12px);
    color:var(--text-primary);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .sidebar-toggle svg{ width:18px;height:18px; }

  .sidebar-backdrop{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.5);
    z-index:9;
    display:none;
  }
  .sidebar-backdrop.show{ display:block; }

  /* ---------------- Main area ---------------- */
  .main{
    flex:1;
    margin-left:var(--sidebar-w);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    z-index:1;
    transition:margin-left 0.25s ease;
  }
  .main.full-width{ margin-left:0; }

  .stage{
    position:relative;
    width:100%;
    max-width:720px;
    padding:8vh 24px 6vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    flex:1;
  }

  .welcome{ display:flex; flex-direction:column; align-items:center; }
  .stage.has-messages .welcome{ display:none; }

  .eyebrow{
    font-size:13px; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--text-muted); margin-bottom:18px;
    opacity:0; animation:fadeUp 0.8s ease forwards; animation-delay:0.1s;
  }
  h1{
    font-family:'Fraunces',serif; font-weight:480; font-style:italic;
    font-size:clamp(32px,5vw,52px); line-height:1.15; text-align:center;
    margin:0 0 14px; min-height:1.3em;
    opacity:0; animation:fadeUp 0.9s ease forwards; animation-delay:0.25s;
  }
  .subhead{
    color:var(--text-muted); font-size:16px; text-align:center; margin:0 0 36px;
    opacity:0; animation:fadeUp 0.9s ease forwards; animation-delay:0.4s;
  }
  @keyframes fadeUp{ from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }

  .aperture{ position:relative; width:100%; border-radius:20px; padding:2px; }

  .input-row{
    position:relative; z-index:1;
    background:var(--panel); backdrop-filter:blur(18px);
    border-radius:18px; border:1px solid var(--panel-border);
    display:flex; align-items:flex-end; padding:8px 8px 8px 22px; gap:10px;
  }

  textarea{
    flex:1; background:transparent; border:none; outline:none; resize:none;
    color:var(--text-primary); font-family:'Inter',sans-serif; font-size:16px;
    line-height:1.5; padding:12px 0; max-height:160px;
  }
  textarea::placeholder{ color:var(--text-muted); }

  .send-btn{
    flex-shrink:0; width:44px;height:44px; border-radius:14px; border:none;
    background:linear-gradient(135deg,var(--glow-violet),var(--glow-coral));
    color:#fff; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform 0.15s ease, opacity 0.15s ease;
  }
  .send-btn:hover{ transform:translateY(-2px); }
  .send-btn:active{ transform:translateY(0) scale(0.94); }
  .send-btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }
  .send-btn svg{ width:18px;height:18px; }

  .search-toggle{
    flex-shrink:0; width:44px;height:44px; border-radius:14px;
    border:1px solid var(--panel-border); background:transparent; color:var(--text-muted);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:all 0.18s ease;
  }
  .search-toggle:hover{ color:var(--text-primary); border-color:rgba(255,255,255,0.2); }
  .search-toggle svg{ width:18px;height:18px; }
  .search-toggle.active{
    color:#fff; border-color:transparent;
    background:linear-gradient(135deg,var(--glow-violet),var(--glow-coral));
  }

  .hint{
    margin-top:14px; font-size:12.5px; color:var(--text-muted); text-align:center;
  }
  .hint kbd{ font-family:inherit; border:1px solid var(--panel-border); border-radius:5px; padding:1px 6px; font-size:11px; }
  .stage.has-messages .hint{ margin-bottom:0; }

  /* conversation */
  .thread{ width:100%; margin-top:0; display:flex; flex-direction:column; gap:18px; order:-1; margin-bottom:28px; }
  .stage.has-messages{ padding-top:4vh; }

  .bubble{
    max-width:88%; padding:14px 18px; border-radius:16px; font-size:15px;
    line-height:1.55; opacity:0; transform:translateY(10px);
    animation:fadeUp 0.45s ease forwards; white-space:pre-wrap;
  }
  .bubble.user{ align-self:flex-end; background:linear-gradient(135deg,rgba(91,95,239,0.25),rgba(224,102,75,0.18)); border:1px solid var(--panel-border); }
  .bubble.ai{ align-self:flex-start; background:var(--panel); border:1px solid var(--panel-border); backdrop-filter:blur(12px); }
  .bubble.error{ align-self:flex-start; background:rgba(224,102,75,0.12); border:1px solid rgba(224,102,75,0.4); color:#f2c9bd; }

  .citations{ margin-top:10px; padding-top:10px; border-top:1px solid var(--panel-border); display:flex; flex-direction:column; gap:4px; }
  .citations a{ font-size:12.5px; color:var(--text-muted); text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .citations a:hover{ color:var(--text-primary); text-decoration:underline; }

  .typing-dots{ display:inline-flex; gap:4px; align-items:center; }
  .typing-dots span{ width:6px;height:6px; border-radius:50%; background:var(--text-muted); animation:bounce 1.1s infinite ease-in-out; }
  .typing-dots span:nth-child(2){ animation-delay:0.15s; }
  .typing-dots span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bounce{ 0%,80%,100%{transform:translateY(0);opacity:0.4;} 40%{transform:translateY(-5px);opacity:1;} }

  footer{ z-index:1; padding:18px 24px 28px; font-size:11.5px; color:var(--text-muted); text-align:center; }

  @media (max-width: 860px){
    .sidebar{ transform:translateX(calc(-1 * var(--sidebar-w))); }
    .sidebar.open{ transform:translateX(0); }
    .main{ margin-left:0; }
    .stage{ padding-top:64px; }
  }

  @media (prefers-reduced-motion: reduce){
    .orb, h1, .eyebrow, .subhead, .bubble{ animation:none !important; opacity:1 !important; transform:none !important; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle chat list">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="12" x2="21" y2="12"></line>
    <line x1="3" y1="6" x2="21" y2="6"></line>
    <line x1="3" y1="18" x2="21" y2="18"></line>
  </svg>
</button>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="sidebar" id="sidebar">
  <button class="new-chat-btn" id="newChatBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
    New chat
  </button>
  <div class="chat-list" id="chatList"></div>
</div>

<div class="main" id="mainArea">
  <div class="stage" id="stage">

    <div class="welcome">
      <div class="eyebrow">A blank page, on purpose</div>
      <h1 id="greeting"></h1>
      <p class="subhead">Type a thought below. That's the whole interface.</p>
    </div>

    <div class="thread" id="thread"></div>

    <div class="aperture" id="aperture">
      <div class="input-row">
        <textarea id="prompt" placeholder="Ask me anything…" rows="1" autofocus></textarea>
        <button class="search-toggle" id="searchToggle" type="button" aria-label="Toggle web search" title="Search the web for this message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="send-btn" id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
          </svg>
        </button>
      </div>
    </div>
    <div class="hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for a new line · tap 🔍 to search the web for one message</div>

  </div>

  <footer>Powered by your own model endpoint, your own chats, stored only in this browser.</footer>
</div>

<script>
  // ============================================================
  // Storage layer — chats persist in this browser via localStorage
  // ============================================================
  const STORAGE_KEY = "ownai_chats_v1";
  const ACTIVE_KEY = "ownai_active_chat_v1";

  function loadChats() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch {
      return {};
    }
  }
  function saveChats(chats) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
  }
  function loadActiveId() {
    return localStorage.getItem(ACTIVE_KEY);
  }
  function saveActiveId(id) {
    localStorage.setItem(ACTIVE_KEY, id);
  }

  let chats = loadChats();
  let activeId = loadActiveId();

  function makeChatId() {
    return 'chat_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  }

  function createNewChat() {
    const id = makeChatId();
    chats[id] = { title: null, messages: [], createdAt: Date.now() };
    activeId = id;
    saveChats(chats);
    saveActiveId(activeId);
    return id;
  }

  // Ensure there's always an active chat to land on
  if (!activeId || !chats[activeId]) {
    createNewChat();
  }

  // ============================================================
  // Rotating welcome heading (only matters for empty chats)
  // ============================================================
  const greetings = [
    "What's on your mind?",
    "Where should we start?",
    "Ask away.",
    "Curious about something?",
    "Let's figure it out together.",
    "What are you working on today?"
  ];
  document.getElementById('greeting').textContent = greetings[Math.floor(Math.random() * greetings.length)];

  // ============================================================
  // Elements
  // ============================================================
  const promptEl = document.getElementById('prompt');
  const sendBtn = document.getElementById('sendBtn');
  const searchToggle = document.getElementById('searchToggle');
  const thread = document.getElementById('thread');
  const stage = document.getElementById('stage');
  const chatListEl = document.getElementById('chatList');
  const newChatBtn = document.getElementById('newChatBtn');
  const sidebar = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');

  let searchEnabled = false;
  searchToggle.addEventListener('click', () => {
    searchEnabled = !searchEnabled;
    searchToggle.classList.toggle('active', searchEnabled);
    searchToggle.title = searchEnabled ? "Web search ON for next message" : "Search the web for this message";
  });

  // ---------- Sidebar open/close (mobile) ----------
  function openSidebar() {
    sidebar.classList.add('open');
    sidebarBackdrop.classList.add('show');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarBackdrop.classList.remove('show');
  }
  sidebarToggle.addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  sidebarBackdrop.addEventListener('click', closeSidebar);

  // ---------- Rendering the chat list ----------
  function renderChatList() {
    chatListEl.innerHTML = '';
    const ids = Object.keys(chats).sort((a, b) => chats[b].createdAt - chats[a].createdAt);

    if (ids.length === 0) {
      chatListEl.innerHTML = '<div class="sidebar-empty">No chats yet</div>';
      return;
    }

    ids.forEach((id) => {
      const chat = chats[id];
      const item = document.createElement('div');
      item.className = 'chat-item' + (id === activeId ? ' active' : '');

      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = chat.title || 'New chat';
      item.appendChild(title);

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteChat(id);
      });
      item.appendChild(del);

      item.addEventListener('click', () => switchChat(id));
      chatListEl.appendChild(item);
    });
  }

  function deleteChat(id) {
    delete chats[id];
    saveChats(chats);

    if (id === activeId) {
      const remaining = Object.keys(chats);
      if (remaining.length > 0) {
        activeId = remaining.sort((a, b) => chats[b].createdAt - chats[a].createdAt)[0];
        saveActiveId(activeId);
      } else {
        createNewChat();
      }
    }
    renderChatList();
    renderActiveChat();
  }

  function switchChat(id) {
    activeId = id;
    saveActiveId(activeId);
    renderChatList();
    renderActiveChat();
    closeSidebar();
  }

  newChatBtn.addEventListener('click', () => {
    createNewChat();
    renderChatList();
    renderActiveChat();
    closeSidebar();
    promptEl.focus();
  });

  // ---------- Rendering the active chat's messages ----------
  function renderActiveChat() {
    thread.innerHTML = '';
    const chat = chats[activeId];
    const hasMessages = chat.messages.length > 0;
    stage.classList.toggle('has-messages', hasMessages);

    chat.messages.forEach((m) => {
      if (m.role === 'user') {
        addBubble(m.content, 'user');
      } else {
        addAiBubble(m.content, m.citations || []);
      }
    });
  }

  function addBubble(text, role) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    div.textContent = text;
    thread.appendChild(div);
    return div;
  }

  function addAiBubble(text, citations) {
    const div = document.createElement('div');
    div.className = 'bubble ai';
    const textNode = document.createElement('div');
    textNode.textContent = text;
    div.appendChild(textNode);
    if (citations && citations.length) {
      const list = document.createElement('div');
      list.className = 'citations';
      citations.forEach((url) => {
        const a = document.createElement('a');
        a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.textContent = url;
        list.appendChild(a);
      });
      div.appendChild(list);
    }
    thread.appendChild(div);
    return div;
  }

  function addTypingBubble() {
    const div = document.createElement('div');
    div.className = 'bubble ai';
    div.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
    thread.appendChild(div);
    return div;
  }

  // ---------- Sending a message ----------
  promptEl.addEventListener('input', () => {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
  });
  promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
  sendBtn.addEventListener('click', handleSend);

  async function handleSend() {
    const text = promptEl.value.trim();
    if (!text) return;

    const chat = chats[activeId];

    // First message in a chat becomes its sidebar title.
    if (!chat.title) {
      chat.title = text.length > 42 ? text.slice(0, 42) + '…' : text;
    }

    chat.messages.push({ role: 'user', content: text });
    saveChats(chats);
    renderChatList();
    stage.classList.add('has-messages');
    addBubble(text, 'user');

    promptEl.value = '';
    promptEl.style.height = 'auto';
    sendBtn.disabled = true;

    const usingSearch = searchEnabled;
    searchEnabled = false;
    searchToggle.classList.remove('active');

    const typingBubble = addTypingBubble();
    if (usingSearch) {
      typingBubble.querySelector('.typing-dots').insertAdjacentHTML(
        'beforebegin', '<span style="font-size:13px;color:var(--text-muted);margin-right:8px;">Searching the web…</span>'
      );
    }

    try {
      const { reply, citations } = await callAI(chat.messages, usingSearch);
      typingBubble.remove();
      chat.messages.push({ role: 'assistant', content: reply, citations });
      saveChats(chats);
      addAiBubble(reply, citations);
    } catch (err) {
      typingBubble.remove();
      addBubble(
        'Couldn\'t reach the model. ' + (err.message || 'Unknown error') +
        '\n\nThis usually means the request needs to go through your own backend ' +
        'rather than directly from the browser — see the comment in callAI() below.',
        'error'
      );
    } finally {
      sendBtn.disabled = false;
      promptEl.focus();
    }
  }

  /* =========================================================================
     callAI(messages, search)
     -------------------------------------------------------------------------
     Sends the FULL conversation so far (not just the latest message) to
     /api/chat (api/chat.js), so the model has context across turns.
     ========================================================================= */
  async function callAI(messages, search) {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: messages.map(m => ({ role: m.role, content: m.content })),
        search
      })
    });

    if (!response.ok) {
      throw new Error(`Request failed (${response.status})`);
    }

    const data = await response.json();
    return { reply: data.reply ?? "(empty response)", citations: data.citations || [] };
  }

  // ---------- Initial render ----------
  renderChatList();
  renderActiveChat();
</script>

</body>
</html>
