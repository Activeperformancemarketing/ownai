<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperture — Ask Anything</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0b0d17;
    --glow-violet:#5b5fef;
    --glow-coral:#e0664b;
    --text-primary:#f2f1f7;
    --text-muted:#8a8aa3;
    --panel:rgba(20,21,36,0.55);
    --panel-border:rgba(255,255,255,0.08);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}

  body{
    background:var(--bg-deep);
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ambient drifting orbs */
  .orb{
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.35;
    pointer-events:none;
    z-index:0;
  }
  .orb-1{
    width:520px;height:520px;
    background:var(--glow-violet);
    top:-180px;left:-160px;
    animation:drift1 22s ease-in-out infinite;
  }
  .orb-2{
    width:460px;height:460px;
    background:var(--glow-coral);
    bottom:-200px;right:-150px;
    animation:drift2 26s ease-in-out infinite;
  }
  @keyframes drift1{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(60px,40px) scale(1.1);}
  }
  @keyframes drift2{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-50px,-30px) scale(1.08);}
  }

  .stage{
    position:relative;
    z-index:1;
    width:100%;
    max-width:720px;
    padding:8vh 24px 6vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    flex:1;
  }

  .eyebrow{
    font-size:13px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:18px;
    opacity:0;
    animation:fadeUp 0.8s ease forwards;
    animation-delay:0.1s;
  }

  h1{
    font-family:'Fraunces',serif;
    font-weight:480;
    font-style:italic;
    font-size:clamp(32px,5vw,52px);
    line-height:1.15;
    text-align:center;
    margin:0 0 14px;
    min-height:1.3em;
    opacity:0;
    animation:fadeUp 0.9s ease forwards;
    animation-delay:0.25s;
  }

  .subhead{
    color:var(--text-muted);
    font-size:16px;
    text-align:center;
    margin:0 0 56px;
    opacity:0;
    animation:fadeUp 0.9s ease forwards;
    animation-delay:0.4s;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* the aperture input */
  .aperture{
    position:relative;
    width:100%;
    border-radius:20px;
    padding:2px;
    opacity:0;
    animation:fadeUp 1s ease forwards;
    animation-delay:0.55s;
  }

  .input-row{
    position:relative;
    z-index:1;
    background:var(--panel);
    backdrop-filter:blur(18px);
    border-radius:18px;
    border:1px solid var(--panel-border);
    display:flex;
    align-items:flex-end;
    padding:8px 8px 8px 22px;
    gap:10px;
  }

  textarea{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    resize:none;
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    font-size:16px;
    line-height:1.5;
    padding:12px 0;
    max-height:160px;
  }
  textarea::placeholder{color:var(--text-muted);}

  .send-btn{
    flex-shrink:0;
    width:44px;height:44px;
    border-radius:14px;
    border:none;
    background:linear-gradient(135deg,var(--glow-violet),var(--glow-coral));
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform 0.15s ease, opacity 0.15s ease;
  }
  .send-btn:hover{transform:translateY(-2px);}
  .send-btn:active{transform:translateY(0) scale(0.94);}
  .send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .send-btn svg{width:18px;height:18px;}

  .hint{
    margin-top:14px;
    font-size:12.5px;
    color:var(--text-muted);
    text-align:center;
    opacity:0;
    animation:fadeUp 1s ease forwards;
    animation-delay:0.7s;
  }
  .hint kbd{
    font-family:inherit;
    border:1px solid var(--panel-border);
    border-radius:5px;
    padding:1px 6px;
    font-size:11px;
  }

  /* conversation */
  .thread{
    width:100%;
    margin-top:34px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .bubble{
    max-width:88%;
    padding:14px 18px;
    border-radius:16px;
    font-size:15px;
    line-height:1.55;
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp 0.45s ease forwards;
    white-space:pre-wrap;
  }
  .bubble.user{
    align-self:flex-end;
    background:linear-gradient(135deg,rgba(91,95,239,0.25),rgba(224,102,75,0.18));
    border:1px solid var(--panel-border);
  }
  .bubble.ai{
    align-self:flex-start;
    background:var(--panel);
    border:1px solid var(--panel-border);
    backdrop-filter:blur(12px);
  }
  .bubble.error{
    align-self:flex-start;
    background:rgba(224,102,75,0.12);
    border:1px solid rgba(224,102,75,0.4);
    color:#f2c9bd;
  }

  .typing-dots{
    display:inline-flex;
    gap:4px;
    align-items:center;
  }
  .typing-dots span{
    width:6px;height:6px;
    border-radius:50%;
    background:var(--text-muted);
    animation:bounce 1.1s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){animation-delay:0.15s;}
  .typing-dots span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{
    0%,80%,100%{transform:translateY(0);opacity:0.4;}
    40%{transform:translateY(-5px);opacity:1;}
  }

  footer{
    z-index:1;
    padding:18px 24px 28px;
    font-size:11.5px;
    color:var(--text-muted);
    text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .orb, .aperture::before, h1, .eyebrow, .subhead, .hint, .aperture, .bubble{
      animation:none !important;
      opacity:1 !important;
      transform:none !important;
    }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="stage">
  <div class="eyebrow">A blank page, on purpose</div>
  <h1 id="greeting"></h1>
  <p class="subhead">Type a thought below. That's the whole interface.</p>

  <div class="aperture" id="aperture">
    <div class="input-row">
      <textarea id="prompt" placeholder="Ask me anything…" rows="1" autofocus></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
  </div>
  <div class="hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for a new line</div>

  <div class="thread" id="thread"></div>
</div>

<footer>Powered by your own model endpoint — nothing is sent anywhere until you wire it up.</footer>

<script>
  // ---------- Rotating welcome headings ----------
  const greetings = [
    "What's on your mind?",
    "Where should we start?",
    "Ask away.",
    "Curious about something?",
    "Let's figure it out together.",
    "What are you working on today?"
  ];
  const greetingEl = document.getElementById('greeting');
  greetingEl.textContent = greetings[Math.floor(Math.random() * greetings.length)];

  // ---------- Elements ----------
  const promptEl = document.getElementById('prompt');
  const sendBtn = document.getElementById('sendBtn');
  const thread = document.getElementById('thread');
  const aperture = document.getElementById('aperture');

  // Auto-grow textarea
  promptEl.addEventListener('input', () => {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
  });

  promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
  sendBtn.addEventListener('click', handleSend);

  function addBubble(text, role) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    div.textContent = text;
    thread.appendChild(div);
    return div;
  }

  function addTypingBubble() {
    const div = document.createElement('div');
    div.className = 'bubble ai';
    div.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
    thread.appendChild(div);
    return div;
  }

  async function handleSend() {
    const text = promptEl.value.trim();
    if (!text) return;

    addBubble(text, 'user');
    promptEl.value = '';
    promptEl.style.height = 'auto';
    sendBtn.disabled = true;
    aperture.classList.add('thinking');

    const typingBubble = addTypingBubble();

    try {
      const reply = await callAI(text);
      typingBubble.remove();
      addBubble(reply, 'ai');
    } catch (err) {
      typingBubble.remove();
      addBubble(
        'Couldn\'t reach the model. ' + (err.message || 'Unknown error') +
        '\n\nThis usually means the request needs to go through your own backend ' +
        'rather than directly from the browser — see the comment in callAI() below.',
        'error'
      );
    } finally {
      sendBtn.disabled = false;
      aperture.classList.remove('thinking');
      promptEl.focus();
    }
  }

  /* =========================================================================
     callAI(message)
     -------------------------------------------------------------------------
     This is the ONLY function that talks to the model. Swap its internals
     to point at your own backend instead of calling the provider directly.

     ⚠️ IMPORTANT — do not ship this as-is to production:
     Calling a provider's API directly from client-side JS means your API
     key is visible to anyone who opens devtools, and most providers
     (including NVIDIA's NIM endpoint below) block browser-origin requests
     via CORS anyway. The correct setup is:

         Browser  →  your backend (holds the secret key)  →  provider API

     For local testing only, you can paste a key below. Replace it with a
     call to your own /api/chat route before deploying anywhere public.
     ========================================================================= */
  async function callAI(message) {
    // Talks to YOUR serverless function at /api/chat (api/chat.js).
    // Because it's a relative path, this works automatically once deployed
    // on Vercel — no key here, no CORS issue, since both the page and the
    // function live on the same domain.
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    if (!response.ok) {
      throw new Error(`Request failed (${response.status})`);
    }

    const data = await response.json();
    return data.reply ?? "(empty response)";
  }
</script>

</body>
</html>
